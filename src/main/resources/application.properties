spring.application.name=block-not

# --- Price tracker (CoinGecko) ---
# Add more coins by comma-separating CoinGecko IDs, e.g. cardano,bitcoin,ethereum
blocknot.tracker.coin-ids=${CRYPTO_CURRENCIES}

# Quote currency for prices
blocknot.tracker.vs-currency=${FIAT_CURRENCY}

# Polling interval (milliseconds)
blocknot.tracker.poll-delay-ms=${POLL_INTERVAL_MS}

# API base URL (change if you later use a proxy)
blocknot.tracker.api-base-url=https://api.coingecko.com/api/v3

# Request timeout (milliseconds)
blocknot.tracker.request-timeout-ms=3000

# Price thresholds - Telegram notification sent only when price surpasses threshold
# Format: blocknot.tracker.price-thresholds.{coin-id}={threshold-value}
blocknot.tracker.price-thresholds.cardano=${PRICE_THRESHOLD_CARDANO}
blocknot.tracker.price-thresholds.polkadot=${PRICE_THRESHOLD_POLKADOT}
blocknot.tracker.price-thresholds.ethereum=${PRICE_THRESHOLD_ETHEREUM}

# --- Telegram Bot ---
# Get your bot token from @BotFather on Telegram
blocknot.telegram.bot-token=${TELEGRAM_BOT_TOKEN}

# Chat ID to send messages to (can be a user ID or group chat ID)
blocknot.telegram.chat-id=${TELEGRAM_CHAT_ID}

# Request timeout for Telegram API calls (milliseconds)
blocknot.telegram.request-timeout-ms=5000

# Maximum consecutive Telegram send failures before crashing the application
blocknot.telegram.max-consecutive-failures=3



